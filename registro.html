<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro — UNSHOT Bar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/shared.css"/>
  <style>
    .register-wrap {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 16px 60px;
    }
    .register-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
    }
    .register-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 4px;
    }
    .form-label-g {
      font-size: .68rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      display: block;
      font-family: 'Cormorant Garamond', serif;
    }
    .form-field {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--white);
      padding: 12px 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      width: 100%;
      transition: border-color .2s;
    }
    .form-field::placeholder { color: var(--muted); }
    .form-field:focus { outline: none; border-color: var(--gold); background: rgba(201,168,76,.05); box-shadow: none; }
    .btn-submit {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s;
      margin-top: 6px;
    }
    .btn-submit:hover { background: var(--gold); color: var(--bg); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
    .success-box {
      display: none;
      background: rgba(201,168,76,.08);
      border: 1px solid var(--gold-dark);
      padding: 28px;
      text-align: center;
      margin-top: 20px;
    }
    .success-box h4 { font-family: 'Playfair Display', serif; color: var(--gold); }
    .success-box p  { color: var(--muted); font-size: .9rem; margin: 8px 0 0; }
    .err-msg { color: #f87171; font-size: .88rem; margin-top: 12px; display: none; }
    @media (max-width: 520px) {
      .register-box { padding: 32px 20px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="brand-logo" href="index.html"><em>UN</em><span>SHOT</span></a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <i class="bi bi-list" style="color:var(--gold);font-size:1.5rem"></i>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="carta.html">Carta</a></li>
        <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
        <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
        <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        <li class="nav-item ms-2"><a class="nav-link btn-nav" href="index.html#reservar">Reservar Mesa</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="register-wrap">
  <div class="register-box">
    <div class="section-tag mb-2">— Bienvenido —</div>
    <h2>Crear cuenta</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:28px">Regístrate para gestionar tus reservas en UNSHOT Bar.</p>

    <div id="registerForm">
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label-g">Nombre</label>
          <input type="text" id="nombre" class="form-field" placeholder="Tu nombre"/>
        </div>
        <div class="col-6">
          <label class="form-label-g">Apellido</label>
          <input type="text" id="apellido" class="form-field" placeholder="Tu apellido"/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label-g">Correo electrónico</label>
        <input type="email" id="email" class="form-field" placeholder="correo@ejemplo.com"/>
      </div>

      <div class="mb-4">
        <label class="form-label-g">Teléfono (opcional)</label>
        <input type="tel" id="telefono" class="form-field" placeholder="+51 900 000 000"/>
      </div>

      <div id="errMsg" class="err-msg"></div>
      <button class="btn-submit" id="btnRegistrar" onclick="registrar()">
        <i class="bi bi-person-plus me-2"></i>Registrarse
      </button>

      <p class="text-center mt-4" style="font-size:.82rem;color:var(--muted)">
        ¿Ya tienes cuenta? <a href="reservas.html" style="color:var(--gold)">Consulta tus reservas</a>
      </p>
    </div>

    <div class="success-box" id="successBox">
      <i class="bi bi-check-circle" style="font-size:2.5rem;color:var(--gold)"></i>
      <h4 class="mt-3">Registro exitoso</h4>
      <p id="successMsg"></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
  async function registrar() {
    const nombre   = document.getElementById('nombre').value.trim()
    const apellido = document.getElementById('apellido').value.trim()
    const email    = document.getElementById('email').value.trim()
    const telefono = document.getElementById('telefono').value.trim()
    const errEl    = document.getElementById('errMsg')
    const btn      = document.getElementById('btnRegistrar')

    errEl.style.display = 'none'

    if (!nombre || !apellido || !email) {
      errEl.textContent = 'Nombre, apellido y correo son obligatorios.'
      errEl.style.display = 'block'
      return
    }

    btn.disabled = true
    btn.textContent = 'Registrando...'

    const { data, error } = await supabaseClient
      .from('clientes')
      .insert([{ nombre, apellido, email, telefono: telefono || null }])
      .select()

    btn.disabled = false
    btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Registrarse'

    if (error) {
      errEl.textContent = error.code === '23505'
        ? 'Ya existe una cuenta con ese correo electrónico.'
        : 'Error al registrar: ' + error.message
      errEl.style.display = 'block'
      return
    }

    document.getElementById('registerForm').style.display = 'none'
    document.getElementById('successMsg').textContent =
      `Bienvenido, ${nombre}. Ya puedes consultar tus reservas con tu correo.`
    document.getElementById('successBox').style.display = 'block'
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') registrar()
  })
</script>
</body>
</html>
