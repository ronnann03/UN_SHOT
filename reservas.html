<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Reservas — UNSHOT Bar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/shared.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
  <style>
    .hero-bg {
      background-image: url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1600&auto=format&fit=crop&q=85');
    }
    .search-form-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      padding: 36px 32px;
      max-width: 520px;
      margin: 0 auto 40px;
    }
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      padding: 28px;
      margin-bottom: 16px;
    }
    .result-card h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--white);
      margin-bottom: 14px;
    }
    .detail-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      font-size: .9rem;
    }
    .detail-row i { color: var(--gold); min-width: 18px; margin-top: 2px; }
    .detail-row span { color: var(--text); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="brand-logo" href="index.html"><em>UN</em><span>SHOT</span></a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <i class="bi bi-list" style="color:var(--gold);font-size:1.5rem"></i>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="carta.html">Carta</a></li>
        <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
        <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
        <li class="nav-item"><a class="nav-link active" href="reservas.html">Mis Reservas</a></li>
        <li class="nav-item ms-2"><a class="nav-link btn-nav" href="index.html#reservar">Reservar Mesa</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="page-hero">
  <div class="hero-bg"></div>
  <div class="container hero-content">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
        <li class="breadcrumb-item active">Mis Reservas</li>
      </ol>
    </nav>
    <h1>Consulta tu<br><em style="color:var(--gold)">Reserva</em></h1>
    <div class="gold-line mt-3"></div>
    <p>Ingresa tu correo para ver el estado de tus reservas.</p>
  </div>
</div>

<!-- BUSCADOR -->
<section style="background:var(--bg);padding:80px 0">
  <div class="container">

    <div class="search-form-box">
      <p class="form-label-g" style="font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-family:'Cormorant Garamond',serif">Correo electrónico</p>
      <div class="d-flex gap-2">
        <input type="email" id="emailBuscar" class="form-control" placeholder="tu@correo.com"
          style="background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--white);border-radius:0;font-family:'Cormorant Garamond',serif"/>
        <button onclick="buscarReservas()" class="btn-gold" style="padding:10px 22px;white-space:nowrap">
          <i class="bi bi-search me-1"></i>Buscar
        </button>
      </div>
    </div>

    <div id="resultados" class="mx-auto" style="max-width:520px"></div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="row justify-content-between align-items-center">
      <div class="col-auto"><div class="footer-logo"><em>UN</em><span>SHOT</span></div></div>
      <div class="col-auto d-flex gap-4 flex-wrap">
        <a href="index.html">Inicio</a>
        <a href="carta.html">Carta</a>
        <a href="contacto.html">Contacto</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2025 UNSHOT Bar. Todos los derechos reservados.</span>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/main.js"></script>
<script>
  document.getElementById('emailBuscar').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarReservas()
  })

  async function buscarReservas() {
    const email = document.getElementById('emailBuscar').value.trim()
    const res   = document.getElementById('resultados')

    if (!email) {
      res.innerHTML = `<p style="color:var(--muted);text-align:center">Ingresa tu correo para buscar.</p>`
      return
    }

    res.innerHTML = `<p style="color:var(--muted);text-align:center">Buscando...</p>`

    const { data: clientes, error: errC } = await supabaseClient
      .from('clientes')
      .select('id_cliente, nombre, apellido')
      .eq('email', email)

    if (errC || !clientes || clientes.length === 0) {
      res.innerHTML = `<p style="color:var(--muted);text-align:center">No encontramos ningún cliente con ese correo.</p>`
      return
    }

    const cliente = clientes[0]
    const { data: reservas, error: errR } = await supabaseClient
      .from('reservas')
      .select('*')
      .eq('id_cliente', cliente.id_cliente)
      .order('fecha', { ascending: false })

    if (errR || !reservas || reservas.length === 0) {
      res.innerHTML = `<p style="color:var(--muted);text-align:center">No tienes reservas registradas.</p>`
      return
    }

    res.innerHTML = `
      <p style="font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px">
        ${reservas.length} reserva(s) para ${cliente.nombre} ${cliente.apellido}
      </p>
      ${reservas.map(r => `
        <div class="result-card">
          <h4><i class="bi bi-calendar3 me-2" style="color:var(--gold)"></i>Reserva #${r.id_reserva}</h4>
          <div class="detail-row"><i class="bi bi-calendar-date"></i><span>${formatDate(r.fecha)}</span></div>
          <div class="detail-row"><i class="bi bi-clock"></i><span>${formatTime(r.hora)}</span></div>
          <div class="detail-row"><i class="bi bi-people"></i><span>${r.num_personas} persona(s)</span></div>
          ${r.ocasion ? `<div class="detail-row"><i class="bi bi-star"></i><span>${r.ocasion}</span></div>` : ''}
          <div class="detail-row"><i class="bi bi-circle-fill" style="font-size:.5rem;margin-top:5px"></i><span>${badgeEstado(r.estado)}</span></div>
        </div>
      `).join('')}
    `
  }
</script>
</body>
</html>
